name: Update GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Switch to trash branch
        run: |
          git fetch origin trash || true
          git checkout trash || git checkout -b trash origin/trash || git checkout -b trash
          git pull origin trash || true

      - name: Generate stats (mirror)
        run: |
          curl -L \
          "https://github-readme-stats-git-masterrstaa-rickstaa.vercel.app/api/top-langs/?username=ArtttNik&layout=compact&langs_count=8&theme=github_dark&hide_border=true&count_private=true" \
          -o top-langs.svg

      - name: Validate SVG
        run: |
          if grep -q "<svg" top-langs.svg; then
            echo "SVG valid"
          else
            echo "Invalid SVG, skipping commit"
            exit 0
          fi

      - name: Commit and push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add top-langs.svg
          git commit -m "update stats" || echo "no changes"

          git push origin trash
